syntax = "proto3";

package workers;

service WorkersService {
  // Register a new worker instance or reconnect an existing one
  rpc Join(JoinRequest) returns (JoinResponse);
  
  // Maintain a persistent connection to signal worker health and receive updates
  rpc Alive(AliveRequest) returns (stream AliveResponse);
  
  // Retrieve the manifest containing tool download information
  rpc GetManifest(GetManifestRequest) returns (GetManifestResponse);
  
  // Stream tool binaries from the server to the worker
  rpc DownloadTools(DownloadToolsRequest) returns (stream DownloadToolsResponse);
}

// Request payload for worker registration
message JoinRequest {
  string api_key = 1;     // API key for authentication
  string signature = 2;   // Worker signature for verification
  optional string token = 3; // Existing token for reconnection
}

// Response payload after successful registration
message JoinResponse {
  string worker_id = 1;    // Unique identifier assigned to the worker
  string worker_token = 2; // Secret token for subsequent requests
}

message AliveRequest {
  string worker_token = 1;
}

message AliveResponse {
  bool alive = 1;
  string last_seen_at = 2;
  string worker_id = 3;
}

message GetManifestRequest {}

message GetManifestResponse {
  string download_tools_url = 1;
}

message DownloadToolsRequest {
  string url = 1;
}

message DownloadToolsResponse {
  bytes chunk = 1;
  int32 offset = 2;
  bool eof = 3;
}