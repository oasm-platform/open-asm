version: '3'

vars:
  replicas: '{{.replicas | default 1}}'
  apiKey: '{{.apiKey | default .API_KEY}}'
  maxJobs: '{{.maxJobs | default .MAX_JOBS}}'
  network: '{{.network | default ""}}'

tasks:
  # Run worker in development mode
  # Usage: task dev replicas=1 maxJobs=10 apiKey=your_api_key network=your_network_id
  dev:
    cmds:
      - |
        for i in $(seq 1 {{.replicas}}); do
           echo "Starting worker instance $i"
          go run ./cmd/oasm-worker \
            --api-key {{.apiKey}} \
            --max-concurrency {{.maxJobs}} \
            --network {{.network}} &
        done
        wait
    silent: false

  # Build the worker project
  # Creates optimized production build
  build:
    cmds:
      - go build -o oasm-worker ./cmd/oasm-worker

  # Install dependencies (Go modules)
  install:
    cmds:
      - go mod tidy

  # Run tests
  # Executes all tests in the project
  test:
    cmds:
      - go test ./...

  # Check code without building binary
  # Verifies compilation of all packages
  check:
    cmds:
      - go build ./...

  # Format code
  # Applies gofmt to all source files
  format:
    cmds:
      - go fmt ./...

  # Run linter
  # Executes go vet for code quality checks
  lint:
    cmds:
      - go vet ./...
