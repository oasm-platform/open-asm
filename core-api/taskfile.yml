version: '3'

tasks:
  dev:
    cmds:
      - pnpm run start:dev
    env:
      NODE_ENV: 'development'
  build:
    cmds:
      - pnpm run build
  prod:
    cmds:
      - pnpm run start:prod
    env:
      NODE_ENV: 'production'
  install: pnpm install
  lint: pnpm run lint
  proto: pnpm run proto:generate
  # Run tests
  # Executes unit and integration tests for the core-api application
  test:
    cmds:
      - pnpm run test
  clean:
    cmds:
      - rm -rf ./husky
      - rm -rf ./node_modules
      - rm -rf ./dist
  # Generate migration with custom name
  # Usage: task migration:generate MIGRATION_NAME=AddUserType
  migration:generate:
    cmds:
      - pnpm exec ts-node --project tsconfig.json -r tsconfig-paths/register -- ../node_modules/typeorm/cli.js migration:generate -d src/database/database-config.ts src/database/migrations/{{.name}}
  # Run all pending migrations
  # Executes all pending database migrations
  migration:run:
    cmds:
      - pnpm exec ts-node --project tsconfig.json -r tsconfig-paths/register -- ../node_modules/typeorm/cli.js migration:run -d src/database/database-config.ts
  # Revert the last migration
  # Rolls back the most recently executed migration
  migration:revert:
    cmds:
      - pnpm exec ts-node --project tsconfig.json -r tsconfig-paths/register -- ../node_modules/typeorm/cli.js migration:revert -d src/database/database-config.ts
