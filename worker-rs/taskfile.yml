version: '3'

vars:
  replicas: '{{.replicas | default 1}}'
  apiKey: '{{.apiKey | default .API_KEY}}'
  maxJobs: '{{.maxJobs | default .MAX_JOBS}}'

tasks:
  # Run worker in development mode with hot-reload
  # Usage: task worker:dev replicas=1 maxJobs=10 apiKey=your_api_key
  dev:
    cmds:
      - |
        for i in $(seq 1 {{.replicas}}); do
          echo "Starting worker-rs instance $i"
          cargo run -- \
            --api-key {{.apiKey}} \
            --max-concurrent-jobs {{.maxJobs}} &
        done
        wait
    silent: false

  # Build the worker-rs project
  # Creates optimized production build
  build:
    cmds:
      - cargo build --release

  # Install dependencies (Rust crates)
  install:
    cmds:
      - cargo fetch

  # Clean build artifacts
  # Removes all compiled outputs and temporary files
  clean:
    cmds:
      - cargo clean

  # Run tests
  # Executes unit and integration tests
  test:
    cmds:
      - cargo test

  # Check code without building
  # Runs compiler checks to catch errors early
  check:
    cmds:
      - cargo check

  # Format code
  # Applies Rust formatter to all source files
  format:
    cmds:
      - cargo fmt

  # Run linter
  # Executes clippy for code quality checks
  lint:
    cmds:
      - cargo clippy -- -D warnings
