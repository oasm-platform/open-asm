name: Frontend Tests

on:
  push:
    branches: [main, develop]
    paths: ['console/**']
  pull_request:
    branches: [main, develop]
    paths: ['console/**']

permissions:
  contents: read

jobs:
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test:run --workspace=console
      - run: npm run test:coverage --workspace=console

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: console/coverage/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-integration]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oasm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
        working-directory: console

      - name: Start API
        working-directory: core-api
        run: |
          npm run build
          npm run start:prod &
          sleep 10

      - name: Start Console
        working-directory: console
        run: |
          npm run dev &
          sleep 5

      - name: Run E2E
        working-directory: console
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: console/e2e/playwright-report/

      - name: Upload E2E Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: console/e2e/test-results/
