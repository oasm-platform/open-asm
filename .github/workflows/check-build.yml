name: Check Build

on:
  pull_request:
    branches:
      - 'main'
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  # Detect file changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      console: ${{ steps.filter.outputs.console }}
      core-api: ${{ steps.filter.outputs.core-api }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            console:
              - 'console/**'
              - 'console/.dockerignore'
              - 'console/Dockerfile'
            core-api:
              - 'core-api/**'
              - 'core-api/.dockerignore'
              - 'core-api/Dockerfile'
            worker:
              - 'worker/**'
              - 'worker/.dockerignore'
              - 'worker/Dockerfile'

  build-console:
    name: Build Docker - Console
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.console == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Console)
        uses: docker/build-push-action@v5
        with:
          context: ./console
          push: false
          load: true
          tags: oasm/oasm-console:test

  build-core-api:
    name: Build Docker - Core API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.core-api == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Core API)
        uses: docker/build-push-action@v5
        with:
          context: ./core-api
          push: false
          load: true
          tags: oasm/oasm-api:test

  build-worker:
    name: Build Docker - Worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Worker)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
          tags: oasm/oasm-worker:test

  check-build:
    name: Check Build - All Services
    runs-on: ubuntu-latest
    needs: [build-console, build-core-api, build-worker]
    if: >-
      (needs.build-console.result == 'success' || needs.build-console.result == 'skipped') &&
      (needs.build-core-api.result == 'success' || needs.build-core-api.result == 'skipped') &&
      (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped')
    steps:
      - name: Check if all builds passed
        run: |
          FAILED=0

          if [ "${{ needs.build-console.result }}" == "failure" ]; then
            echo "Console build failed"
            FAILED=1
          fi

          if [ "${{ needs.build-core-api.result }}" == "failure" ]; then
            echo "Core API build failed"
            FAILED=1
          fi

          if [ "${{ needs.build-worker.result }}" == "failure" ]; then
            echo "Worker build failed"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            echo "One or more Docker builds failed"
            exit 1
          fi
          echo "All Docker builds passed successfully"
