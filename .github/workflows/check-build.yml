name: Check Build

on:
  pull_request:
    branches:
      - 'main'
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  # Detect file changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      console: ${{ steps.filter.outputs.console }}
      core-api: ${{ steps.filter.outputs.core-api }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            console:
              - 'console/**'
              - 'console/.dockerignore'
              - 'console/Dockerfile'
            core-api:
              - 'core-api/**'
              - 'core-api/.dockerignore'
              - 'core-api/Dockerfile'
            worker:
              - 'worker/**'
              - 'worker/.dockerignore'
              - 'worker/Dockerfile'

  build-console:
    name: Build Docker - Console
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.console == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (Console)
        uses: docker/build-push-action@v7
        with:
          context: ./console
          push: false
          load: true
          tags: oasm/oasm-console:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-core-api:
    name: Build Docker - Core API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.core-api == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (Core API)
        uses: docker/build-push-action@v7
        with:
          context: ./core-api
          push: false
          load: true
          tags: oasm/oasm-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    name: Build Docker - Worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (Worker)
        uses: docker/build-push-action@v7
        with:
          context: ./worker
          push: false
          load: true
          tags: oasm/oasm-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
