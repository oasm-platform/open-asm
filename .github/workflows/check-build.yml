name: Check Build

on:
  push:
    branches:
      - '**'

jobs:
  build-console:
    name: Build Docker - Console
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Console)
        uses: docker/build-push-action@v5
        with:
          context: ./console
          push: false
          load: true
          tags: oasm/oasm-console:test

  build-core-api:
    name: Build Docker - Core API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Core API)
        uses: docker/build-push-action@v5
        with:
          context: ./core-api
          push: false
          load: true
          tags: oasm/oasm-api:test

  build-worker:
    name: Build Docker - Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Worker)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
          tags: oasm/oasm-worker:test

  check-build:
    name: Check Build - All Services
    runs-on: ubuntu-latest
    needs: [build-console, build-core-api, build-worker]
    if: always()
    steps:
      - name: Check if all builds passed
        run: |
          if [ "${{ needs.build-console.result }}" != "success" ] || \
             [ "${{ needs.build-core-api.result }}" != "success" ] || \
             [ "${{ needs.build-worker.result }}" != "success" ]; then
            echo "One or more Docker builds failed"
            exit 1
          fi
          echo "All Docker builds passed successfully"
