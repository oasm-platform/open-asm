name: Check Lint

on:
  push:
    branches:
      - '**'
    paths:
      - 'core-api/**'
      - 'console/**'
      - 'package*.json'
      - 'tsconfig*.json'
  pull_request:
    branches:
      - '**'
    paths:
      - 'core-api/**'
      - 'console/**'
      - 'package*.json'
      - 'tsconfig*.json'

jobs:
  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core-api, console]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint --workspace=${{ matrix.service }}
