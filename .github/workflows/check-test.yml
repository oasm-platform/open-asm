name: Check Test

on:
  push:
    branches:
      - '**'
    paths:
      - 'core-api/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig*.json'
  pull_request:
    branches:
      - '**'
    paths:
      - 'core-api/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig*.json'

jobs:
  test:
    name: Check Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        working-directory: core-api

      - name: Run tests
        run: pnpm run test
        working-directory: core-api
